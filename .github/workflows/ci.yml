name: CI

on:
  push:
    branches:
      - '**'
    paths:
      - 'api/**'
      - 'cmd/**'
      - 'internal/**'
      - 'tests/**'
      - 'web/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - 'Taskfile.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'api/**'
      - 'cmd/**'
      - 'internal/**'
      - 'tests/**'
      - 'web/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - 'Taskfile.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Prepare embedded web dist placeholder
        run: |
          mkdir -p web/dist
          touch web/dist/.gitkeep

      - run: task test:go

  unit-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install Task
        uses: go-task/setup-task@v1

      - run: cd web && bun install --frozen-lockfile

      - run: task test:web

  rest-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install Task
        uses: go-task/setup-task@v1

      - run: task guard:rest

  smoke-test:
    needs: [unit-test-go, unit-test-frontend, rest-guard]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [meilisearch, typesense]
    name: smoke-test-${{ matrix.backend }}
    env:
      NPA_SEARCH_BACKEND: ${{ matrix.backend }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Start services
        run: task stack:ci:up

      - name: Run smoke tests
        run: task smoke:run

      - name: Export logs on failure
        if: failure()
        run: task stack:ci:logs

      - name: Cleanup
        if: always()
        run: task stack:ci:down

  e2e-test:
    needs: [smoke-test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [meilisearch, typesense]
    name: e2e-test-${{ matrix.backend }}
    env:
      NPA_SEARCH_BACKEND: ${{ matrix.backend }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Start app services
        run: task stack:ci:up

      - name: Run E2E tests
        run: task e2e:run

      - name: Upload test artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 7

      - name: Export logs on failure
        if: failure()
        run: task stack:ci:logs

      - name: Cleanup
        if: always()
        run: task stack:ci:down
