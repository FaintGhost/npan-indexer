name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_key: amd64
            runs_on: '["ubuntu-latest"]'
          - platform: linux/arm64
            platform_key: arm64
            runs_on: '["self-hosted","Linux","ARM64","debian13","trixie"]'
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image names
        id: prep
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(echo "${repo_name}" | tr '[:upper:]' '[:lower:]')"
          dockerhub_user_lc="$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')"

          echo "dockerhub_image=${dockerhub_user_lc}/${repo_lc}" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=ghcr.io/${owner_lc}/${repo_lc}" >> "$GITHUB_OUTPUT"

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ steps.prep.outputs.ghcr_image }},push-by-digest=true,name-canonical=true,push=true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: |
            type=gha,scope=docker-publish-${{ matrix.platform_key }}
            type=registry,ref=${{ steps.prep.outputs.ghcr_image }}:buildcache-${{ matrix.platform_key }}
          cache-to: |
            type=gha,mode=max,scope=docker-publish-${{ matrix.platform_key }}
            type=registry,ref=${{ steps.prep.outputs.ghcr_image }}:buildcache-${{ matrix.platform_key }},mode=max,image-manifest=true,oci-mediatypes=true

      - name: Prepare digest artifact path
        id: digest_path
        shell: bash
        run: |
          set -euo pipefail
          digest_dir="${RUNNER_TEMP}/digests-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.platform_key }}"
          rm -rf "${digest_dir}"
          mkdir -p "${digest_dir}"
          echo "dir=${digest_dir}" >> "$GITHUB_OUTPUT"

      - name: Export digest
        id: export_digest
        shell: bash
        run: |
          set -euo pipefail
          digest="${{ steps.build.outputs.digest }}"
          digest_file="${{ steps.digest_path.outputs.dir }}/${digest#sha256:}"
          touch "${digest_file}"
          echo "file=${digest_file}" >> "$GITHUB_OUTPUT"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_key }}
          path: ${{ steps.export_digest.outputs.file }}
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge multi-platform image
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Download digest artifacts
        id: download_digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/merge-digests-${{ github.run_id }}-${{ github.run_attempt }}
          pattern: digests-*
          merge-multiple: true

      - name: Validate downloaded digest count
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t digests < <(find "${{ steps.download_digests.outputs.download-path }}" -maxdepth 1 -type f -printf '%f\n' | sort)
          printf 'Downloaded digest files (%s):\n' "${#digests[@]}"
          printf '  - %s\n' "${digests[@]}"
          if [ "${#digests[@]}" -ne 2 ]; then
            echo "Expected exactly 2 digest files (amd64 + arm64), got ${#digests[@]}" >&2
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image names
        id: prep
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(echo "${repo_name}" | tr '[:upper:]' '[:lower:]')"
          dockerhub_user_lc="$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')"

          echo "dockerhub_image=${dockerhub_user_lc}/${repo_lc}" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=ghcr.io/${owner_lc}/${repo_lc}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.prep.outputs.dockerhub_image }}
            ${{ steps.prep.outputs.ghcr_image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Create and push Docker Hub manifest
        working-directory: ${{ steps.download_digests.outputs.download-path }}
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
          SOURCE_IMAGE: ${{ steps.prep.outputs.ghcr_image }}
          TARGET_IMAGE: ${{ steps.prep.outputs.dockerhub_image }}
        run: |
          sources=""
          for digest in *; do
            sources="${sources} ${SOURCE_IMAGE}@sha256:${digest}"
          done
          tags="$(jq -cr '.tags | map(select(startswith(env.TARGET_IMAGE + ":")) | "-t " + .) | join(" ")' <<<"${DOCKER_METADATA_OUTPUT_JSON}")"
          docker buildx imagetools create ${tags} ${sources}

      - name: Create and push GHCR manifest
        working-directory: ${{ steps.download_digests.outputs.download-path }}
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
          SOURCE_IMAGE: ${{ steps.prep.outputs.ghcr_image }}
          TARGET_IMAGE: ${{ steps.prep.outputs.ghcr_image }}
        run: |
          sources=""
          for digest in *; do
            sources="${sources} ${SOURCE_IMAGE}@sha256:${digest}"
          done
          tags="$(jq -cr '.tags | map(select(startswith(env.TARGET_IMAGE + ":")) | "-t " + .) | join(" ")' <<<"${DOCKER_METADATA_OUTPUT_JSON}")"
          docker buildx imagetools create ${tags} ${sources}
